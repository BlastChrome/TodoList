<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge"> 
    <link rel="stylesheet" href="/css/styles.css"> 
    <script src="https://kit.fontawesome.com/25b13f05a6.js"></script>

    <title>Todo List</title>
</head> 
    <header>
        <h1>Todo List!</h1>
    </header> 
    <main>
        <div class="user_input_div">
            <input id="todo_input" type="text" placeholder="Please Enter a Todo!"> 
            <i id="add_todo_btn" class="fas fa-plus-square"></i>
        </div>  
        <div id="list_body">
            <ul id="list">       
            </ul>
        </div>
    </main>


<script src="js/app.js"></script>
</body>
</html>
