<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge"> 
    <link rel="stylesheet" href="/css/styles.css">   
    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100;300;500;700;900&display=swap" rel="stylesheet">
    <!-- font awesome cdn -->
    <script src="https://kit.fontawesome.com/25b13f05a6.js"></script> 

    <!-- iconify cdn --> 
    <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
 
    <title>Todo List</title> 

    <body>
        <header>
            <h1 id="header-text">Todo List</h1>
        </header>  

            <div id="input-container"  class="container">
                <input type="text" id="todo-input" placeholder="Please Enter a Todo..."> 
               
                <div class="icon-container" id="add-btn">
                    <span class="iconify" data-icon="mdi:shape-square-plus" data-inline="false" data-width="3rem" data-height="3rem"></span>
                </div>

                <div class="icon-container" id="delete-btn">
                    <span class="iconify" data-icon="mdi:delete-alert-outline" data-inline="false" data-width="3rem" data-height="3rem"></span>
                </div>
            </div>  

            <ol id="todo-items-container"> 
                <div class="container item-container">
                    <li class="todo-item" ><p>Test Todo</p></li> 
                    <div class="icon-container edit-btn">
                        <span class="iconify" data-icon="ic:outline-edit" data-inline="false" data-height="1.6rem"></span>
                    </div>
                    <div class="icon-container trash-btn">
                        <span class="iconify" data-icon="carbon:trash-can" data-inline="false" data-height="1.6rem"></span>
                    </div>   
                </div>
                <div class="container item-container">
                    <li class="todo-item" ><p>Test Todo</p></li> 
                    <div class="icon-container edit-btn">
                        <span class="iconify" data-icon="ic:outline-edit" data-inline="false" data-height="1.6rem"></span>
                    </div>
                    <div class="icon-container trash-btn">
                        <span class="iconify" data-icon="carbon:trash-can" data-inline="false" data-height="1.6rem"></span>
                    </div>   
                </div>
            </ol>
    </body>


<script src="js/app.js"></script>
</body>
</html>
